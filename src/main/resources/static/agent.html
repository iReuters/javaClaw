<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaClaw Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-width: 280px;
            --header-height: 60px;
            --bg-primary: #ffffff;
            --bg-secondary: #f7f7f8;
            --bg-tertiary: #ececf0;
            --bg-hover: #f4f4f5;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --text-tertiary: #999999;
            --border-color: #e5e5e5;
            --accent-color: #10a37f;
            --accent-hover: #0d8a6a;
            --user-bg: #10a37f;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Figtree', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--bg-primary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--accent-color), #1a9e6f);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .logo-icon svg {
            width: 20px;
            height: 20px;
        }

        .logo-text {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .new-chat-btn {
            width: 100%;
            padding: 10px 16px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .new-chat-btn:hover {
            background: var(--bg-hover);
        }

        .new-chat-btn svg {
            width: 18px;
            height: 18px;
            opacity: 0.8;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px 8px;
        }

        .history-item {
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: var(--text-secondary);
            transition: all 0.15s ease;
            margin-bottom: 2px;
        }

        .history-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .history-item.active {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .history-item svg {
            width: 16px;
            height: 16px;
            opacity: 0.6;
            flex-shrink: 0;
        }

        .history-item span {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: var(--bg-primary);
        }

        /* Header */
        .header {
            height: var(--header-height);
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-primary);
        }

        .header-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-badge {
            font-size: 11px;
            font-weight: 500;
            padding: 2px 8px;
            background: var(--accent-color);
            color: white;
            border-radius: 10px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-btn {
            padding: 8px 12px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.15s ease;
        }

        .header-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .header-btn svg {
            width: 16px;
            height: 16px;
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }

        /* Steps Wrapper */
        .steps-wrapper {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px 24px;
        }

        /* Welcome Screen */
        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100%;
            padding: 40px 20px;
        }

        .logo-large {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
        }

        .logo-icon-large {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-md);
            background: linear-gradient(135deg, var(--accent-color), #1a9e6f);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .logo-icon-large svg {
            width: 28px;
            height: 28px;
        }

        .logo-text {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        .welcome-subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 40px;
            text-align: center;
            max-width: 500px;
            line-height: 1.5;
        }

        .examples-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            max-width: 700px;
            width: 100%;
            padding: 0 20px;
        }

        .example-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 16px 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
        }

        .example-card:hover {
            background: var(--bg-tertiary);
            transform: translateY(-2px);
        }

        .example-card-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .example-card-title svg {
            width: 14px;
            height: 14px;
            opacity: 0.7;
        }

        .example-card-desc {
            font-size: 12px;
            color: var(--text-tertiary);
            line-height: 1.4;
        }

        /* Step Card */
        .step-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            margin-bottom: 16px;
            overflow: hidden;
            animation: stepIn 0.3s ease;
        }

        @keyframes stepIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .step-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
        }

        .step-number {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--accent-color);
            color: white;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .step-number.thinking {
            background: #f59e0b;
        }

        .step-number.final {
            background: var(--accent-color);
        }

        .step-info {
            flex: 1;
        }

        .step-type {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .step-time {
            font-size: 11px;
            color: var(--text-tertiary);
        }

        .step-toggle {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-tertiary);
            transition: transform 0.2s ease;
        }

        .step-toggle.collapsed {
            transform: rotate(-90deg);
        }

        .step-content {
            padding: 16px 20px;
        }

        .step-content.collapsed {
            display: none;
        }

        /* Reasoning Section */
        .reasoning-section {
            background: #fef9e7;
            border: 1px solid #fde68a;
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            margin-bottom: 16px;
        }

        .reasoning-label {
            font-size: 11px;
            font-weight: 600;
            color: #b45309;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .reasoning-label svg {
            width: 14px;
            height: 14px;
        }

        .reasoning-text {
            font-size: 14px;
            line-height: 1.6;
            color: #78350f;
        }

        /* Content Section */
        .content-section {
            margin-bottom: 16px;
        }

        .section-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-tertiary);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .content-text {
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-primary);
        }

        .content-text[data-raw="true"] {
            white-space: pre-wrap;
            font-family: inherit;
        }

        /* Tool Calls Section */
        .tool-calls-section {
            margin-bottom: 16px;
        }

        .tool-calls-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .tool-call-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            font-size: 13px;
        }

        .tool-call-icon {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            background: var(--accent-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .tool-call-icon svg {
            width: 14px;
            height: 14px;
        }

        .tool-call-name {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
            color: var(--text-primary);
        }

        .tool-call-args {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-secondary);
            margin-left: auto;
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Tool Results Section */
        .tool-results-section {
            margin-bottom: 16px;
        }

        .tool-result-item {
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            margin-bottom: 8px;
            overflow: hidden;
        }

        .tool-result-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: #ecfdf5;
            border-bottom: 1px solid var(--border-color);
        }

        .tool-result-icon {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            background: var(--accent-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tool-result-icon svg {
            width: 14px;
            height: 14px;
        }

        .tool-result-name {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .tool-result-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            background: var(--accent-color);
            color: white;
            margin-left: auto;
        }

        .tool-result-content {
            padding: 12px 14px;
            font-size: 13px;
            line-height: 1.5;
            color: var(--text-primary);
            max-height: 200px;
            overflow-y: auto;
        }

        /* Input Area */
        .input-area {
            padding: 16px 24px 24px;
            background: var(--bg-primary);
            border-top: 1px solid var(--border-color);
        }

        .input-wrapper {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
        }

        .input-container {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 8px 8px 8px 16px;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
        }

        .input-container:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(16, 163, 127, 0.1);
        }

        .message-input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 15px;
            font-family: inherit;
            color: var(--text-primary);
            resize: none;
            outline: none;
            max-height: 200px;
            min-height: 24px;
            line-height: 1.5;
            padding: 8px 0;
        }

        .message-input::placeholder {
            color: var(--text-tertiary);
        }

        .send-button {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
            background: var(--accent-color);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .send-button:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }

        .send-button:disabled {
            background: var(--bg-tertiary);
            cursor: not-allowed;
            transform: none;
        }

        .send-button svg {
            width: 18px;
            height: 18px;
            color: white;
        }

        .input-hint {
            font-size: 11px;
            color: var(--text-tertiary);
            text-align: center;
            margin-top: 8px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-tertiary);
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            .examples-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-area">
                <div class="logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </div>
                <span class="logo-text">Agent</span>
            </div>
            <button class="new-chat-btn" id="new-chat-btn">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
                新建对话
            </button>
        </div>
        <div class="sidebar-content">
            <div class="sidebar-section" id="history-sessions"></div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
        <header class="header">
            <div class="header-title">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" width="20" height="20">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
                JavaClaw Agent
                <span class="header-badge">Beta</span>
            </div>
            <div class="header-actions">
                <button class="header-btn" id="clear-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                    清空
                </button>
            </div>
        </header>

        <div class="chat-container" id="chat-container">
            <!-- Welcome Screen -->
            <div class="welcome-screen" id="welcome-screen">
                <div class="logo-large">
                    <div class="logo-icon-large">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                    </div>
                    <span class="logo-text">JavaClaw Agent</span>
                </div>
                <p class="welcome-subtitle">
                    智能体模式 - 逐步执行，清晰展示思考过程和工具调用结果。
                    支持天气查询、股票价格、新闻搜索、数学计算等多种工具。
                </p>
                <div class="examples-grid">
                    <div class="example-card" data-prompt="北京今天天气怎么样？">
                        <div class="example-card-title">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z" />
                            </svg>
                            天气查询
                        </div>
                        <div class="example-card-desc">查询城市天气信息</div>
                    </div>
                    <div class="example-card" data-prompt="AAPL股票现在多少钱？">
                        <div class="example-card-title">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                            </svg>
                            股票价格
                        </div>
                        <div class="example-card-desc">查询股票实时价格</div>
                    </div>
                    <div class="example-card" data-prompt="最新科技新闻有哪些？">
                        <div class="example-card-title">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z" />
                            </svg>
                            新闻搜索
                        </div>
                        <div class="example-card-desc">获取最新资讯</div>
                    </div>
                    <div class="example-card" data-prompt="帮我计算 (25+10)*2 - 15等于多少？">
                        <div class="example-card-title">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                            </svg>
                            数学计算
                        </div>
                        <div class="example-card-desc">执行数学运算</div>
                    </div>
                </div>
            </div>

            <!-- Steps Container -->
            <div class="steps-wrapper" id="steps-wrapper" style="display: none;"></div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <div class="input-container">
                    <textarea
                        class="message-input"
                        id="message-input"
                        placeholder="输入消息，Shift+Enter换行，Enter发送..."
                        rows="1"
                    ></textarea>
                    <button class="send-button" id="send-button" disabled>
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                        </svg>
                    </button>
                </div>
                <div class="input-hint">JavaClaw Agent 逐步展示思考过程和工具调用结果</div>
            </div>
        </div>
    </main>

    <script>
        // API Configuration
        const API_BASE_URL = 'http://localhost:8080';
        const STREAM_STEPS_ENDPOINT = '/api/chat/stream/steps';

        // State
        let isStreaming = false;
        let currentSession = 'agent:' + Date.now();
        let sessions = {};
        let currentSteps = [];

        // DOM Elements
        const chatContainer = document.getElementById('chat-container');
        const welcomeScreen = document.getElementById('welcome-screen');
        const stepsWrapper = document.getElementById('steps-wrapper');
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('send-button');
        const newChatBtn = document.getElementById('new-chat-btn');
        const clearBtn = document.getElementById('clear-btn');
        const historySessions = document.getElementById('history-sessions');

        // Initialize
        function init() {
            loadSessions();
            bindEvents();
            renderSidebar();
        }

        // Load sessions from storage
        function loadSessions() {
            try {
                const saved = localStorage.getItem('javaclaw_agent_sessions');
                if (saved) {
                    sessions = JSON.parse(saved);
                }
            } catch (e) {
                sessions = {};
            }

            if (Object.keys(sessions).length === 0) {
                sessions[currentSession] = {
                    id: currentSession,
                    name: '新对话',
                    messages: [],
                    lastActive: new Date()
                };
                saveSessions();
            }
        }

        // Save sessions to storage
        function saveSessions() {
            try {
                localStorage.setItem('javaclaw_agent_sessions', JSON.stringify(sessions));
            } catch (e) {
                console.error('Failed to save sessions:', e);
            }
        }

        // Bind events
        function bindEvents() {
            messageInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 200) + 'px';
                updateSendButton();
            });

            messageInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            sendButton.addEventListener('click', sendMessage);
            newChatBtn.addEventListener('click', createNewChat);
            clearBtn.addEventListener('click', clearCurrentChat);

            document.querySelectorAll('.example-card').forEach(card => {
                card.addEventListener('click', function() {
                    const prompt = this.dataset.prompt;
                    messageInput.value = prompt;
                    updateSendButton();
                    sendMessage();
                });
            });
        }

        // Update send button state
        function updateSendButton() {
            sendButton.disabled = !messageInput.value.trim() || isStreaming;
        }

        // Create new chat
        function createNewChat() {
            currentSession = 'agent:' + Date.now();
            sessions[currentSession] = {
                id: currentSession,
                name: '新对话',
                messages: [],
                lastActive: new Date()
            };
            saveSessions();

            welcomeScreen.style.display = 'flex';
            stepsWrapper.style.display = 'none';
            stepsWrapper.innerHTML = '';
            messageInput.value = '';
            updateSendButton();
            renderSidebar();
        }

        // Clear current chat
        function clearCurrentChat() {
            if (confirm('确定要清空当前对话吗？')) {
                sessions[currentSession].messages = [];
                saveSessions();
                welcomeScreen.style.display = 'flex';
                stepsWrapper.style.display = 'none';
                stepsWrapper.innerHTML = '';
                messageInput.value = '';
                updateSendButton();
            }
        }

        // Send message
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isStreaming) return;

            welcomeScreen.style.display = 'none';
            stepsWrapper.style.display = 'block';

            // Reset state for new request
            currentSteps = [];
            pendingStepNumber = null;
            activeStreamingStep = null;

            addUserMessage(message);
            addMessageToSession(message, 'user');
            messageInput.value = '';
            messageInput.style.height = 'auto';
            updateSendButton();

            // Fetch response using SSE steps endpoint
            await fetchStepsResponse(message);
        }

        // Add user message
        function addUserMessage(message) {
            const stepHtml = `
                <div class="step-card">
                    <div class="step-header">
                        <div class="step-number" style="background: var(--user-bg);">U</div>
                        <div class="step-info">
                            <div class="step-type">用户</div>
                            <div class="step-time">${formatTime(new Date())}</div>
                        </div>
                    </div>
                    <div class="step-content">
                        <div class="content-text">${escapeHtml(message)}</div>
                    </div>
                </div>
            `;
            stepsWrapper.insertAdjacentHTML('beforeend', stepHtml);
            scrollToBottom();
        }

        // Fetch steps response
        async function fetchStepsResponse(message) {
            isStreaming = true;
            updateSendButton();

            try {
                const response = await fetch(API_BASE_URL + STREAM_STEPS_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, sessionKey: currentSession })
                });

                if (!response.ok) throw new Error('HTTP ' + response.status);

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });

                    // Process complete lines from buffer
                    while (buffer.includes('\n')) {
                        const newlineIndex = buffer.indexOf('\n');
                        const line = buffer.slice(0, newlineIndex).trim();
                        buffer = buffer.slice(newlineIndex + 1);

                        if (!line) {
                            // Empty line - process accumulated event
                            flushEvent();
                            continue;
                        }

                        if (line.startsWith('event:')) {
                            // Flush previous event before starting new one
                            flushEvent();
                            currentEventName = line.slice(6).trim();
                        } else if (line.startsWith('data:')) {
                            const data = line.slice(5).trim();
                            if (data) {
                                currentData = data;
                            }
                        }
                    }
                }

                // Process remaining event after stream ends
                flushEvent();

                addMessageToSession(JSON.stringify(currentSteps), 'bot');

            } catch (error) {
                console.error('Stream error:', error);
                showError('请求失败: ' + error.message);
            }

            isStreaming = false;
            updateSendButton();
        }

        // Helper to flush accumulated SSE event
        let currentEventName = '';
        let currentData = '';

        function flushEvent() {
            if (currentEventName && currentData) {
                processSSEEvent(currentEventName, currentData);
            }
            currentEventName = '';
            currentData = '';
        }

        // Process SSE event based on event name
        function processSSEEvent(eventName, dataStr) {
            try {
                const data = JSON.parse(dataStr);
                if (eventName === 'token') {
                    // Token streaming event
                    if (data.content !== undefined) {
                        // If no pending step number yet, start with step 1
                        if (pendingStepNumber === null) {
                            pendingStepNumber = 1;
                        }
                        activeStreamingStep = pendingStepNumber;
                        ensurePendingStepCard(pendingStepNumber);
                        appendTokenToLastStep(data.content);
                    }
                } else if (eventName === 'step') {
                    // step_end event
                    if (data.event === 'step_end' && data.step) {
                        const stepNum = data.step.stepNumber || 0;
                        pendingStepNumber = stepNum + 1;
                        activeStreamingStep = stepNum;
                        renderStep(data.step, data.step.content || '');
                    }
                } else if (eventName === 'done') {
                    // All steps complete - reset streaming state
                    pendingStepNumber = null;
                    activeStreamingStep = null;
                }
            } catch (e) {
                console.error('SSE parse error:', e, 'data:', dataStr);
            }
        }

        // Ensure there's a pending step card for streaming tokens
        let pendingStepNumber = null;
        let activeStreamingStep = null;

        function ensurePendingStepCard(stepNum) {
            if (!stepNum) return;

            const existing = stepsWrapper.querySelector(`.step-card[data-step="${stepNum}"]`);
            if (existing) return; // Already exists

            const pendingHtml = `
                <div class="step-card" data-step="${stepNum}">
                    <div class="step-header">
                        <div class="step-number" style="background: #f59e0b;">${stepNum}</div>
                        <div class="step-info">
                            <div class="step-type">streaming</div>
                            <div class="step-time">步骤 ${stepNum}...</div>
                        </div>
                    </div>
                    <div class="step-content">
                        <div class="content-section">
                            <div class="section-label">回复</div>
                            <div class="content-text" data-step="${stepNum}" data-raw="true"></div>
                        </div>
                    </div>
                </div>
            `;
            stepsWrapper.insertAdjacentHTML('beforeend', pendingHtml);
            scrollToBottom();
        }

        // Render step
        function renderStep(step, initialContent) {
            currentSteps.push(step);

            const stepNumber = step.stepNumber;
            const type = step.type || 'tool_call';
            const reasoning = step.reasoning;
            const content = step.content;
            const toolCalls = step.toolCalls || [];
            const toolResults = step.toolResults || [];

            // Determine step class
            let stepClass = 'tool_call';
            if (type === 'final') stepClass = 'final';
            else if (reasoning && (!content || content.length < 20)) stepClass = 'thinking';

            // Build tool calls HTML
            let toolCallsHtml = '';
            if (toolCalls.length > 0) {
                toolCallsHtml = `
                    <div class="tool-calls-section">
                        <div class="section-label">工具调用</div>
                        <div class="tool-calls-list">
                            ${toolCalls.map(tc => `
                                <div class="tool-call-item">
                                    <div class="tool-call-icon">
                                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                        </svg>
                                    </div>
                                    <span class="tool-call-name">${tc.name}</span>
                                    <span class="tool-call-args" title="${escapeHtml(tc.arguments || '')}">${escapeHtml(tc.arguments || '{}')}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            // Build tool results HTML
            let toolResultsHtml = '';
            if (toolResults.length > 0) {
                toolResultsHtml = `
                    <div class="tool-results-section">
                        <div class="section-label">工具结果</div>
                        ${toolResults.map(tr => `
                            <div class="tool-result-item">
                                <div class="tool-result-header">
                                    <div class="tool-result-icon">
                                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                                        </svg>
                                    </div>
                                    <span class="tool-result-name">${tr.toolName}</span>
                                    <span class="tool-result-badge">完成</span>
                                </div>
                                <div class="tool-result-content">${formatPlainText(tr.result || '')}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            // Build reasoning HTML
            let reasoningHtml = '';
            if (reasoning) {
                reasoningHtml = `
                    <div class="reasoning-section">
                        <div class="reasoning-label">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
                            </svg>
                            思考过程
                        </div>
                        <div class="reasoning-text">${formatPlainText(reasoning)}</div>
                    </div>
                `;
            }

            // Build content HTML
            let contentHtml = '';
            // For streaming: content section with empty placeholder for token append
            if (type === 'final' && initialContent !== undefined) {
                // Streaming mode: show initial content and enable token append
                contentHtml = `
                    <div class="content-section">
                        <div class="section-label">回复</div>
                        <div class="content-text" data-step="${stepNumber}" data-raw="true">${formatPlainText(initialContent)}</div>
                    </div>
                `;
            } else if (content) {
                contentHtml = `
                    <div class="content-section">
                        <div class="section-label">回复</div>
                        <div class="content-text">${formatPlainText(content)}</div>
                    </div>
                `;
            }

            // Final step indicator
            let finalBadge = '';
            if (type === 'final') {
                finalBadge = '<span class="tool-result-badge" style="background: var(--accent-color);">完成</span>';
            }

            const stepHtml = `
                <div class="step-card" data-step="${stepNumber}">
                    <div class="step-header" onclick="toggleStep(${stepNumber})">
                        <div class="step-number ${stepClass}">${stepNumber}</div>
                        <div class="step-info">
                            <div class="step-type">${getStepTypeName(type)} ${finalBadge}</div>
                            <div class="step-time">步骤 ${stepNumber}</div>
                        </div>
                        <div class="step-toggle" id="toggle-${stepNumber}">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" width="16" height="16">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                            </svg>
                        </div>
                    </div>
                    <div class="step-content" id="content-${stepNumber}">
                        ${reasoningHtml}
                        ${contentHtml}
                        ${toolCallsHtml}
                        ${toolResultsHtml}
                    </div>
                </div>
            `;

            replaceStepCard(stepNumber, stepHtml);
            scrollToBottom();
        }

        // Append token to last step content for typewriter effect
        function appendTokenToLastStep(token) {
            if (!token || !activeStreamingStep) return;

            // Find the step card matching the active streaming step
            const stepCard = stepsWrapper.querySelector(`.step-card[data-step="${activeStreamingStep}"]`);
            if (!stepCard) return;

            // Find the raw content-text in that step (for streaming)
            const contentText = stepCard.querySelector('.content-text[data-raw="true"]');
            if (contentText) {
                contentText.insertAdjacentText('beforeend', token);
            }
            scrollToBottom();
        }

        // Replace or insert step card
        function replaceStepCard(stepNumber, stepHtml) {
            const existing = stepsWrapper.querySelector(`.step-card[data-step="${stepNumber}"]`);
            if (existing) {
                existing.outerHTML = stepHtml;
            } else {
                stepsWrapper.insertAdjacentHTML('beforeend', stepHtml);
            }
        }

        // Toggle step collapse
        function toggleStep(stepNumber) {
            const content = document.getElementById('content-' + stepNumber);
            const toggle = document.getElementById('toggle-' + stepNumber);

            if (content.classList.contains('collapsed')) {
                content.classList.remove('collapsed');
                toggle.classList.remove('collapsed');
            } else {
                content.classList.add('collapsed');
                toggle.classList.add('collapsed');
            }
        }

        // Show error
        function showError(message) {
            const errorHtml = `
                <div class="step-card">
                    <div class="step-header">
                        <div class="step-number" style="background: #ef4444;">!</div>
                        <div class="step-info">
                            <div class="step-type">错误</div>
                        </div>
                    </div>
                    <div class="step-content">
                        <div class="content-text" style="color: #ef4444;">${escapeHtml(message)}</div>
                    </div>
                </div>
            `;
            stepsWrapper.insertAdjacentHTML('beforeend', errorHtml);
            scrollToBottom();
        }

        // Format plain text (remove markdown)
        function formatPlainText(text) {
            if (!text) return '';
            // Escape HTML
            let formatted = escapeHtml(text);
            // Convert **text** to bold
            formatted = formatted.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            // Convert *text* to italic
            formatted = formatted.replace(/\*(.+?)\*/g, '<em>$1</em>');
            // Convert `code` to inline code
            formatted = formatted.replace(/`([^`]+)`/g, '<code style="background: var(--bg-secondary); padding: 2px 6px; border-radius: 4px; font-family: JetBrains Mono, monospace;">$1</code>');
            // Convert line breaks
            formatted = formatted.replace(/\n/g, '<br>');
            return formatted;
        }

        // Escape HTML
        function escapeHtml(text) {
            if (!text) return '';
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // Get step type name
        function getStepTypeName(type) {
            switch(type) {
                case 'final': return '最终回复';
                case 'tool_call': return '工具调用';
                case 'thinking': return '思考中';
                case 'max_iterations': return '达到最大迭代';
                default: return '执行中';
            }
        }

        // Format time
        function formatTime(date) {
            return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }

        // Scroll to bottom
        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Add message to session
        function addMessageToSession(content, type) {
            if (sessions[currentSession]) {
                sessions[currentSession].messages.push({
                    content,
                    type,
                    timestamp: new Date()
                });
                sessions[currentSession].lastActive = new Date();
                saveSessions();
                renderSidebar();
            }
        }

        // Render sidebar
        function renderSidebar() {
            const today = new Date().toDateString();
            const sorted = Object.values(sessions).sort((a, b) =>
                new Date(b.lastActive) - new Date(a.lastActive)
            );

            let html = '';
            sorted.slice(0, 10).forEach(session => {
                const sessionDate = new Date(session.lastActive).toDateString();
                const isToday = sessionDate === today;
                html += `
                    <div class="history-item ${session.id === currentSession ? 'active' : ''}"
                         data-session="${session.id}">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                        </svg>
                        <span>${session.name}</span>
                    </div>
                `;
            });

            historySessions.innerHTML = html;

            document.querySelectorAll('.history-item').forEach(item => {
                item.addEventListener('click', () => {
                    const sessionId = item.dataset.session;
                    currentSession = sessionId;
                    loadSessionChat(sessionId);
                    renderSidebar();
                });
            });
        }

        // Load session chat
        function loadSessionChat(sessionId) {
            const session = sessions[sessionId];
            if (!session) return;

            if (session.messages.length === 0) {
                welcomeScreen.style.display = 'flex';
                stepsWrapper.style.display = 'none';
            } else {
                welcomeScreen.style.display = 'none';
                stepsWrapper.style.display = 'block';
                stepsWrapper.innerHTML = '';
                session.messages.forEach(msg => {
                    if (msg.type === 'user') {
                        addUserMessage(msg.content);
                    }
                });
            }
            updateSendButton();
        }

        // Start
        init();
    </script>
</body>
</html>
