<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaClaw AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-width: 280px;
            --header-height: 60px;
            --input-height: 80px;
            --bg-primary: #ffffff;
            --bg-secondary: #f7f7f8;
            --bg-tertiary: #ececf0;
            --bg-hover: #f4f4f5;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --text-tertiary: #999999;
            --border-color: #e5e5e5;
            --accent-color: #10a37f;
            --accent-hover: #0d8a6a;
            --bot-bg: #f7f7f8;
            --user-bg: #10a37f;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Figtree', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--bg-primary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            position: relative;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .new-chat-btn:hover {
            background: var(--bg-hover);
        }

        .new-chat-btn svg {
            width: 18px;
            height: 18px;
            opacity: 0.8;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px 8px;
        }

        .sidebar-section {
            margin-bottom: 20px;
        }

        .sidebar-section-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-tertiary);
            padding: 8px 12px;
        }

        .history-item {
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: var(--text-secondary);
            transition: all 0.15s ease;
            margin-bottom: 2px;
        }

        .history-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .history-item.active {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .history-item svg {
            width: 16px;
            height: 16px;
            opacity: 0.6;
            flex-shrink: 0;
        }

        .history-item span {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .sidebar-footer {
            padding: 12px;
            border-top: 1px solid var(--border-color);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-radius: var(--radius-sm);
            cursor: pointer;
        }

        .user-info:hover {
            background: var(--bg-hover);
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-color), #1a9e6f);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 14px;
        }

        .user-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
        }

        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: var(--bg-primary);
            position: relative;
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }

        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100%;
            padding: 40px 20px;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-large {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-md);
            background: linear-gradient(135deg, var(--accent-color), #1a9e6f);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .logo-icon svg {
            width: 28px;
            height: 28px;
        }

        .logo-text {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        .welcome-subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 40px;
            text-align: center;
            max-width: 500px;
            line-height: 1.5;
        }

        /* Example Prompts */
        .examples-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            max-width: 700px;
            width: 100%;
            padding: 0 20px;
        }

        .example-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 16px 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
        }

        .example-card:hover {
            background: var(--bg-tertiary);
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }

        .example-card:active {
            transform: translateY(0);
        }

        .example-card-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .example-card-title svg {
            width: 14px;
            height: 14px;
            opacity: 0.7;
        }

        .example-card-desc {
            font-size: 12px;
            color: var(--text-tertiary);
            line-height: 1.4;
        }

        /* Messages */
        .messages-wrapper {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 24px;
        }

        .message {
            display: flex;
            gap: 16px;
            padding: 20px 0;
            animation: messageIn 0.3s ease;
        }

        @keyframes messageIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message + .message {
            border-top: 1px solid var(--border-color);
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .message-avatar.bot {
            background: var(--bg-secondary);
        }

        .message-avatar.user {
            background: linear-gradient(135deg, var(--accent-color), #1a9e6f);
            color: white;
        }

        .message-avatar svg {
            width: 20px;
            height: 20px;
        }

        .message-content {
            flex: 1;
            min-width: 0;
        }

        .message-text {
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-primary);
            word-wrap: break-word;
        }

        .message-text p {
            margin-bottom: 12px;
        }

        .message-text p:last-child {
            margin-bottom: 0;
        }

        .message-text code {
            background: var(--bg-secondary);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--text-primary);
        }

        .message-text pre {
            background: #1e1e1e;
            color: #d4d4d4;
            border-radius: var(--radius-sm);
            padding: 16px;
            overflow-x: auto;
            margin: 12px 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.5;
        }

        .message-text pre code {
            background: none;
            padding: 0;
            color: inherit;
        }

        .code-block-wrapper {
            position: relative;
        }

        .code-lang {
            position: absolute;
            top: 8px;
            left: 12px;
            font-size: 11px;
            font-weight: 500;
            color: #888;
            text-transform: uppercase;
        }

        .copy-code-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 11px;
            color: #888;
            cursor: pointer;
            transition: all 0.15s ease;
            font-family: inherit;
        }

        .copy-code-btn:hover {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }

        .message-time {
            font-size: 11px;
            color: var(--text-tertiary);
            margin-top: 8px;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 4px 0;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-tertiary);
            animation: typingPulse 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingPulse {
            0%, 60%, 100% { opacity: 0.3; transform: scale(1); }
            30% { opacity: 1; transform: scale(1.1); }
        }

        /* Stream Indicator */
        .stream-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            margin-top: 8px;
            width: fit-content;
        }

        .stream-indicator span {
            font-size: 12px;
            color: var(--text-tertiary);
        }

        /* Input Area */
        .input-area {
            padding: 16px 24px 24px;
            background: var(--bg-primary);
            border-top: 1px solid var(--border-color);
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }

        .input-container {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 8px 8px 8px 16px;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
        }

        .input-container:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(16, 163, 127, 0.1);
        }

        .message-input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 15px;
            font-family: inherit;
            color: var(--text-primary);
            resize: none;
            outline: none;
            max-height: 200px;
            min-height: 24px;
            line-height: 1.5;
            padding: 8px 0;
        }

        .message-input::placeholder {
            color: var(--text-tertiary);
        }

        .send-button {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
            background: var(--accent-color);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .send-button:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }

        .send-button:disabled {
            background: var(--bg-tertiary);
            cursor: not-allowed;
            transform: none;
        }

        .send-button svg {
            width: 18px;
            height: 18px;
            color: white;
        }

        .input-hint {
            font-size: 11px;
            color: var(--text-tertiary);
            text-align: center;
            margin-top: 8px;
        }

        /* Header */
        .header {
            height: var(--header-height);
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-primary);
        }

        .header-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-btn {
            padding: 8px 12px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.15s ease;
        }

        .header-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .header-btn svg {
            width: 16px;
            height: 16px;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }

            .examples-grid {
                grid-template-columns: 1fr;
            }

            .header {
                padding: 0 16px;
            }

            .input-area {
                padding: 12px 16px 20px;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-tertiary);
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" id="new-chat-btn">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
                新建对话
            </button>
        </div>
        <div class="sidebar-content">
            <div class="sidebar-section">
                <div class="sidebar-section-title">今天</div>
                <div id="today-sessions"></div>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-section-title">历史记录</div>
                <div id="history-sessions"></div>
            </div>
        </div>
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar">Z</div>
                <div class="user-name">ztf</div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
        <header class="header">
            <div class="header-title">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" width="20" height="20">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                </svg>
                JavaClaw Chat
            </div>
            <div class="header-actions">
                <button class="header-btn" id="clear-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                    清空
                </button>
            </div>
        </header>

        <div class="chat-container" id="chat-container">
            <!-- Welcome Screen (shown when no messages) -->
            <div class="welcome-screen" id="welcome-screen">
                <div class="logo-large">
                    <div class="logo-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                        </svg>
                    </div>
                    <span class="logo-text">JavaClaw</span>
                </div>
                <p class="welcome-subtitle">
                    我是一个智能编程助手，可以帮助你编写代码、解答问题、debug调试。
                    有什么我可以帮你的吗？
                </p>
                <div class="examples-grid">
                    <div class="example-card" data-prompt="帮我写一个Java函数，计算斐波那契数列第n项">
                        <div class="example-card-title">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
                            </svg>
                            斐波那契数列
                        </div>
                        <div class="example-card-desc">用Java实现一个高效算法</div>
                    </div>
                    <div class="example-card" data-prompt="解释一下什么是Spring Boot，它和Spring Framework有什么区别？">
                        <div class="example-card-title">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                            </svg>
                            Spring Boot
                        </div>
                        <div class="example-card-desc">Spring框架家族详解</div>
                    </div>
                    <div class="example-card" data-prompt="帮我写一个Python爬虫，抓取豆瓣电影Top250的电影信息">
                        <div class="example-card-title">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01" />
                            </svg>
                            Python爬虫
                        </div>
                        <div class="example-card-desc">爬取豆瓣电影排行榜</div>
                    </div>
                    <div class="example-card" data-prompt="MySQL查询很慢，如何优化？有哪些常见的优化方法？">
                        <div class="example-card-title">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4" />
                            </svg>
                            MySQL优化
                        </div>
                        <div class="example-card-desc">数据库性能调优技巧</div>
                    </div>
                </div>
            </div>

            <!-- Messages will be inserted here -->
            <div class="messages-wrapper" id="messages-wrapper" style="display: none;"></div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <div class="input-container">
                    <textarea
                        class="message-input"
                        id="message-input"
                        placeholder="输入消息，Shift+Enter换行，Enter发送..."
                        rows="1"
                    ></textarea>
                    <button class="send-button" id="send-button" disabled>
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                        </svg>
                    </button>
                </div>
                <div class="input-hint">JavaClaw AI 可以会犯错。请核实重要信息。</div>
            </div>
        </div>
    </main>

    <script>
        // API Configuration
        const API_BASE_URL = 'http://localhost:8080';
        const CHAT_ENDPOINT = '/api/chat';
        const STREAM_ENDPOINT = '/api/chat/stream';

        // State
        let isStreaming = false;
        let currentSession = 'web:' + Date.now();
        let sessions = {};

        // DOM Elements
        const chatContainer = document.getElementById('chat-container');
        const welcomeScreen = document.getElementById('welcome-screen');
        const messagesWrapper = document.getElementById('messages-wrapper');
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('send-button');
        const newChatBtn = document.getElementById('new-chat-btn');
        const clearBtn = document.getElementById('clear-btn');
        const todaySessions = document.getElementById('today-sessions');
        const historySessions = document.getElementById('history-sessions');

        // Initialize
        function init() {
            loadSessions();
            bindEvents();
            renderSidebar();
        }

        // Load sessions from storage
        function loadSessions() {
            try {
                const saved = localStorage.getItem('javaclaw_sessions');
                if (saved) {
                    sessions = JSON.parse(saved);
                }
            } catch (e) {
                sessions = {};
            }

            if (Object.keys(sessions).length === 0) {
                sessions[currentSession] = {
                    id: currentSession,
                    name: '新对话',
                    messages: [],
                    lastActive: new Date()
                };
                saveSessions();
            }
        }

        // Save sessions to storage
        function saveSessions() {
            try {
                localStorage.setItem('javaclaw_sessions', JSON.stringify(sessions));
            } catch (e) {
                console.error('Failed to save sessions:', e);
            }
        }

        // Bind events
        function bindEvents() {
            // Auto-resize textarea
            messageInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 200) + 'px';
                updateSendButton();
            });

            // Send on Enter (without Shift)
            messageInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            // Send button
            sendButton.addEventListener('click', sendMessage);

            // New chat button
            newChatBtn.addEventListener('click', createNewChat);

            // Clear button
            clearBtn.addEventListener('click', clearCurrentChat);

            // Example cards
            document.querySelectorAll('.example-card').forEach(card => {
                card.addEventListener('click', function() {
                    const prompt = this.dataset.prompt;
                    messageInput.value = prompt;
                    updateSendButton();
                    sendMessage();
                });
            });
        }

        // Update send button state
        function updateSendButton() {
            sendButton.disabled = !messageInput.value.trim() || isStreaming;
        }

        // Create new chat
        function createNewChat() {
            currentSession = 'web:' + Date.now();
            sessions[currentSession] = {
                id: currentSession,
                name: '新对话',
                messages: [],
                lastActive: new Date()
            };
            saveSessions();

            welcomeScreen.style.display = 'flex';
            messagesWrapper.style.display = 'none';
            messagesWrapper.innerHTML = '';
            messageInput.value = '';
            updateSendButton();
            renderSidebar();
        }

        // Clear current chat
        function clearCurrentChat() {
            if (confirm('确定要清空当前对话吗？')) {
                sessions[currentSession].messages = [];
                saveSessions();
                welcomeScreen.style.display = 'flex';
                messagesWrapper.style.display = 'none';
                messagesWrapper.innerHTML = '';
                messageInput.value = '';
                updateSendButton();
            }
        }

        // Send message
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isStreaming) return;

            // Hide welcome screen
            welcomeScreen.style.display = 'none';
            messagesWrapper.style.display = 'block';

            // Add user message
            addMessage(message, 'user');
            addMessageToSession(message, 'user');
            messageInput.value = '';
            messageInput.style.height = 'auto';
            updateSendButton();

            // Show typing indicator
            const typingId = showTypingIndicator();

            // Fetch response
            await fetchStreamResponse(message, typingId);
        }

        // Fetch stream response
        async function fetchStreamResponse(message, typingId) {
            isStreaming = true;
            updateSendButton();

            let botMessage = '';
            let messageElement = null;
            let buffer = '';

            try {
                const response = await fetch(API_BASE_URL + STREAM_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, sessionKey: currentSession })
                });

                if (!response.ok) throw new Error('HTTP ' + response.status);

                removeTypingIndicator(typingId);

                // Create bot message element
                messageElement = createMessageElement('', 'bot');
                const contentDiv = messageElement.querySelector('.message-text');

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (line.startsWith('data:')) {
                            const data = line.slice(5).trim();
                            if (data === '[DONE]') continue;
                            botMessage += data;
                            contentDiv.innerHTML = formatContent(botMessage);
                            scrollToBottom();
                        }
                    }
                }

                addMessageToSession(botMessage, 'bot');

            } catch (error) {
                console.error('Stream error:', error);
                removeTypingIndicator(typingId);
                if (messageElement) {
                    messageElement.querySelector('.message-text').innerHTML =
                        '<p style="color: #ef4444;">请求失败: ' + error.message + '</p>';
                }
            }

            isStreaming = false;
            updateSendButton();
        }

        // Create message element
        function createMessageElement(content, type) {
            const div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = `
                <div class="message-avatar ${type}">
                    ${type === 'user'
                        ? '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>'
                        : '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>'
                    }
                </div>
                <div class="message-content">
                    <div class="message-text">${formatContent(content)}</div>
                    <div class="message-time">${formatTime(new Date())}</div>
                </div>
            `;
            messagesWrapper.appendChild(div);
            scrollToBottom();
            return div;
        }

        // Add message
        function addMessage(content, type) {
            createMessageElement(content, type);
        }

        // Add message to session
        function addMessageToSession(content, type) {
            if (sessions[currentSession]) {
                sessions[currentSession].messages.push({
                    content,
                    type,
                    timestamp: new Date()
                });
                sessions[currentSession].lastActive = new Date();
                saveSessions();
                renderSidebar();
            }
        }

        // Show typing indicator
        function showTypingIndicator() {
            const id = 'typing-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = 'message';
            div.innerHTML = `
                <div class="message-avatar bot">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                    </svg>
                </div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            messagesWrapper.appendChild(div);
            scrollToBottom();
            return id;
        }

        // Remove typing indicator
        function removeTypingIndicator(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        // Format message content
        function formatContent(content) {
            if (!content) return '';

            // Escape HTML
            let formatted = content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');

            // Code blocks
            formatted = formatted.replace(/```(\w+)?\n([\s\S]*?)```/g, (match, lang, code) => {
                const language = lang || 'code';
                return `
                    <div class="code-block-wrapper">
                        <div class="code-lang">${language}</div>
                        <pre><code>${code.trim()}</code></pre>
                        <button class="copy-code-btn" onclick="copyCode(this)">复制</button>
                    </div>
                `;
            });

            // Inline code
            formatted = formatted.replace(/`([^`]+)`/g, '<code>$1</code>');

            // Paragraphs
            formatted = formatted.split('\n\n').map(p => `<p>${p}</p>`).join('');

            // Line breaks within paragraphs
            formatted = formatted.replace(/\n/g, '<br>');

            return formatted;
        }

        // Copy code
        function copyCode(btn) {
            const code = btn.parentElement.querySelector('code').textContent;
            navigator.clipboard.writeText(code).then(() => {
                btn.textContent = '已复制';
                setTimeout(() => btn.textContent = '复制', 2000);
            });
        }

        // Format time
        function formatTime(date) {
            return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }

        // Scroll to bottom
        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Render sidebar
        function renderSidebar() {
            const today = new Date().toDateString();
            const sorted = Object.values(sessions).sort((a, b) =>
                new Date(b.lastActive) - new Date(a.lastActive)
            );

            let todayHTML = '';
            let historyHTML = '';

            sorted.forEach(session => {
                const sessionDate = new Date(session.lastActive).toDateString();
                const isToday = sessionDate === today;
                const item = `
                    <div class="history-item ${session.id === currentSession ? 'active' : ''}"
                         data-session="${session.id}">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                        </svg>
                        <span>${session.name}</span>
                    </div>
                `;

                if (isToday) {
                    todayHTML += item;
                } else {
                    historyHTML += item;
                }
            });

            todaySessions.innerHTML = todayHTML;
            historySessions.innerHTML = historyHTML;

            // Bind session click events
            document.querySelectorAll('.history-item').forEach(item => {
                item.addEventListener('click', () => {
                    const sessionId = item.dataset.session;
                    currentSession = sessionId;
                    loadSessionChat(sessionId);
                    renderSidebar();
                });
            });
        }

        // Load session chat
        function loadSessionChat(sessionId) {
            const session = sessions[sessionId];
            if (!session) return;

            if (session.messages.length === 0) {
                welcomeScreen.style.display = 'flex';
                messagesWrapper.style.display = 'none';
            } else {
                welcomeScreen.style.display = 'none';
                messagesWrapper.style.display = 'block';
                messagesWrapper.innerHTML = '';
                session.messages.forEach(msg => {
                    addMessage(msg.content, msg.type);
                });
            }
            updateSendButton();
        }

        // Start
        init();
    </script>
</body>
</html>
